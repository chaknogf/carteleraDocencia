<app-navbar></app-navbar>
<div class="formulario-container">
  <div class="header">
    <h3>📘 Formulario de Actividad</h3>
    <button class="btn-volver" (click)="volver()">← Volver</button>
  </div>

  <form (ngSubmit)="guardar()" class="glass-form">
    <fieldset class="fieldset-card">
      <legend (click)="toggleServicios()">
        Datos del Servicio Responsable
        <span class="arrow" [class.open]="mostrarServicios">▾</span>
      </legend>

      <div class="form-flex" id="servicios" [class.open]="mostrarServicios">
        <!-- SUBDIRECCIONES -->
        <div class="form-group">
          <label>Seleccione Dirección o Subdirección Perteneciente</label>
          <app-options-grid
            [items]="subdirecciones"
            [(selectedValue)]="actividad.subdireccion_id"
            name="subdireccion"
            [disabled]="localServicioId > 2 && role === 'estandar'"
            [vertical]="true"
            (selectedValueChange)="onSubdireccionChange($event)"
          ></app-options-grid>
        </div>

        <!-- SERVICIOS DEPENDIENDO DE SUBDIRECCIÓN -->
        <div class="form-group" *ngIf="actividad.subdireccion_id">
          <label>Seleccione el Servicio</label>
          <app-options-grid
            [items]="serviciosPorSubdireccion"
            [(selectedValue)]="actividad.servicio_id"
            name="servicio"
            [disabled]="localServicioId > 2 && role === 'estandar'"
            [vertical]="true"
            [columns]="3"
            (selectedValueChange)="onServicioSeleccionado()"
          ></app-options-grid>
        </div>
      </div>
    </fieldset>
    <fieldset class="fieldset-card">
      <legend (click)="toggleActividad()">
        Información de la Actividad de Docencia
        <span class="arrow" [class.open]="mostrarActividad">▾</span>
      </legend>

      <div class="form-grid" id="actividad" [class.open]="mostrarActividad">
        <!-- Tema -->
        <div class="form-group full">
          <label for="tema">Tema</label>
          <textarea
            type="text"
            id="tema"
            [(ngModel)]="actividad.tema"
            name="tema"
          ></textarea>
        </div>

        <!-- Tipo Actividad -->
        <div class="form-group row-3">
          <label for="actividad">Tipo de Actividad</label>
          <app-options-grid
            [items]="tipoActividades"
            [(selectedValue)]="actividad.actividad_id"
            name="tipoActividad_id"
          ></app-options-grid>
        </div>

        <!-- Modalidad -->
        <div class="form-group row-3">
          <label for="modalidad">Modalidad de la Actividad</label>
          <app-options-grid
            [items]="modalidades"
            [(selectedValue)]="actividad.modalidad_id"
            name="modalidad_id"
          ></app-options-grid>
        </div>

        <!-- Estados -->
        <div class="form-group row-3" *ngIf="enEdicion">
          <label for="estados">Estado de la Actividad </label>
          <app-options-grid
            [items]="estados"
            [(selectedValue)]="actividad.estado_id"
            name="Estado_id"
          ></app-options-grid>
        </div>

        <!-- Fecha -->
        <div class="form-group row-3">
          <label for="fecha">Fecha a Desarrollar</label>
          <input
            type="date"
            id="fecha"
            [(ngModel)]="actividad.fecha_programada"
            name="fecha"
          />
        </div>

        <!-- Mes -->
        <div class="form-group row-3">
          <label for="mes">Mes a Desarrollar</label>
          <select [(ngModel)]="actividad.mes_id" name="mes_id">
            <option *ngFor="let m of meses" [value]="m.value">
              {{ m.label }}
            </option>
          </select>
        </div>

        <!-- Hoario -->
        <div class="form-group row-3">
          <label for="horario">Horario Programado</label>
          <input
            type="time"
            id="horario"
            [(ngModel)]="actividad.horario_programado"
            name="horario"
          />
        </div>

        <!-- Tiempo -->
        <div class="form-group row-3">
          <label for="tiempo">Tiempo Aproximado</label>
          <input
            type="text"
            id="tiempo"
            [(ngModel)]="actividad.tiempo_aproximado"
            name="tiempo"
          />
        </div>

        <!-- Lugar -->
        <div class="form-group row-3">
          <label for="lugar">Lugar</label>

          <select [(ngModel)]="actividad.lugar_id" name="lugar_id">
            <option *ngFor="let item of lugares" [value]="item.id">
              {{ item.nombre }}
            </option>
          </select>
        </div>

        <!-- link -->
        <div class="form-group row-3" *ngIf="actividad.modalidad_id != 1">
          <span
            class="info-icon"
            [innerHTML]="icons['infoico']"
            title="Si tiene el link de la reunion virtual de meet, teams, zoom agregalo acá"
          ></span>
          <label for="link">Link de la Actividad</label>
          <input
            type="text"
            id="tiempo"
            [(ngModel)]="actividad.detalles.link"
            name="link"
          />
        </div>

        <!-- Grupo Dirigido -->
        <div class="form-group row-3">
          <span
            class="info-icon"
            [innerHTML]="icons['infoico']"
            title="Ejemplo: Auxiliares de Registros Médicos"
          ></span>
          <label for="link">Grupo o Personal Dirigido</label>
          <input
            type="text"
            id="grupo"
            [(ngModel)]="actividad.detalles.grupo_dirigido"
            name="grupo_dirigido"
          />
        </div>

        <!-- Responsables -->
        <div class="form-group full">
          <span
            class="info-icon"
            [innerHTML]="icons['infoico']"
            title="Persona que impartira la actividad puede ser el jefe de servicio, personal de otro servicio o es un expositor externo"
          ></span>
          <label>Capacitador o Educador</label>
          <div class="responsables-list">
            <div
              *ngFor="
                let responsable of actividad.persona_responsable | keyvalue
              "
              class="responsable-row"
            >
              <input
                type="text"
                placeholder="Nombre"
                [(ngModel)]="responsable.value.nombre"
                name="nombre{{ responsable.key }}"
              />
              <input
                type="text"
                placeholder="Puesto"
                [(ngModel)]="responsable.value.puesto"
                name="puesto{{ responsable.key }}"
              />
              <button
                type="button"
                class="btn-remove"
                (click)="removerResponsable(responsable.key)"
              >
                −
              </button>
            </div>
            <button
              type="button"
              class="btn-add-responsable"
              (click)="agregarResponsable()"
            >
              + Agregar Responsable
            </button>
          </div>
        </div>

        <!-- Nota -->
        <div class="form-group full">
          <span
            class="info-icon"
            [innerHTML]="icons['infoico']"
            title="Información extra o relavante para la actividad u otros comentarios a tomar en cuenta. ejemplo: 'Traer Ropa Deportiva'"
          ></span>
          <label for="nota">Nota</label>
          <textarea
            id="nota"
            rows="3"
            [(ngModel)]="actividad.detalles.nota"
            name="nota"
          ></textarea>
        </div>
      </div>
    </fieldset>

    <fieldset class="fieldset-card">
      <legend (click)="toggleDetalle()" *ngIf="enEdicion">
        Detalles Extras de la Actividad
        <span class="arrow" [class.open]="mostrarDetalle">▾</span>
      </legend>
      <div
        class="form-grid"
        *ngIf="enEdicion"
        id="detalle"
        [class.open]="mostrarDetalle"
      >
        <!-- Contenido -->
        <div class="form-group full">
          <label for="link">Contenido</label>
          <textarea
            type="text"
            id="contenido"
            [(ngModel)]="actividad.detalles.contenido"
            name="contenido"
            placeholder="ejemplo: Trabajo en equipo"
          ></textarea>
        </div>

        <!-- Duración -->
        <div class="form-group row-3">
          <label for="duracion">Duración</label>
          <input
            type="text"
            id="duracion"
            [(ngModel)]="actividad.detalles.duracion"
            name="duracion"
            placeholder="ejemplo: 1 hora"
          />
        </div>

        <!-- Asistencia -->
        <div class="form-group row-3">
          <label for="asistencia">Total de Asistencia</label>
          <input
            type="number"
            id="asistencia"
            [(ngModel)]="actividad.detalles.asistencia"
            name="asistencia"
          />
        </div>

        <!-- Inasistencia -->
        <div class="form-group row-3">
          <label for="inasistencia">Total de Inasistencia</label>
          <input
            type="number"
            id="inasistencia"
            [(ngModel)]="actividad.detalles.inasistencia"
            name="inasistencia"
          />
        </div>

        <!-- Notas Exelentes -->
        <div class="form-group row-3">
          <label for="excelente">Total de Notas Exelentes</label>
          <input
            type="number"
            id="exelente"
            [(ngModel)]="actividad.detalles.excelente"
            name="excelente"
          />
        </div>

        <!-- Notas Buenas -->
        <div class="form-group row-3">
          <label for="bueno">Total de Notas Buenas</label>
          <input
            type="number"
            id="bueno"
            [(ngModel)]="actividad.detalles.bueno"
            name="bueno"
          />
        </div>

        <!-- Notas Regular -->
        <div class="form-group row-3">
          <label for="regular">Total de Notas Regular</label>
          <input
            type="number"
            id="regular"
            [(ngModel)]="actividad.detalles.regular"
            name="regular"
          />
        </div>

        <!-- Notas Deficiente -->
        <div class="form-group row-3">
          <label for="deficiente">Total de Notas Deficiente</label>
          <input
            type="number"
            id="deficiente"
            [(ngModel)]="actividad.detalles.deficiente"
            name="deficiente"
          />
        </div>

        <!-- Asistencia -->
        <div class="form-group row-3">
          <label for="informe_fecha">Fecha de Informe</label>
          <input
            type="date"
            id="informe_fecha"
            [(ngModel)]="actividad.detalles.fecha_entrega_informe"
            name="informe_fecha"
          />
        </div>
      </div>
    </fieldset>

    <!-- Guardar -->
    <div class="form-actions">
      <button
        type="button"
        class="btn bt-primary bg-success"
        *ngIf="!verificado"
        (click)="validar()"
      >
        Validar
      </button>
      <button type="submit" class="btn btn-primary" *ngIf="verificado">
        💾 Guardar
      </button>
    </div>
  </form>
</div>

<div
  *ngIf="showMensaje"
  class="alert bg-warning mt-3 text-dark"
  [ngClass]="{ 'd-none': verificado }"
>
  <h4>{{ mensajeValidacion }}</h4>
  <ul>
    <li *ngFor="let item of coincidenciasData.coincidencias">
      <strong>Servicio:</strong>
      {{ item.servicio }} – <strong>Tema:</strong> {{ item.tema }} -
      <strong>Lugar:</strong> {{ item.lugar }} - <strong>Hora:</strong>
      {{ item.hora }}
    </li>
  </ul>
</div>
